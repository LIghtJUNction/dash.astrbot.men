name: Sync AstrBot Dashboard

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone AstrBot repository
        run: |
          git clone --depth 1 --branch dev https://github.com/AstrBotDevs/AstrBot.git /tmp/astrbot

      - name: Sync dashboard to root directory
        id: sync
        run: |
          rsync -av --delete --exclude=".git" --exclude=".github" /tmp/astrbot/dashboard/ ./

          # Since .github is excluded from rsync, just check for changes in the working tree
          if git diff --quiet HEAD -- .; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "没有检测到文件变化"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到文件变化"
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore: sync dashboard from AstrBot@dev ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show sync result
        run: |
          echo "=== Sync Complete ==="
          echo "Has changes: ${{ steps.sync.outputs.has_changes }}"
