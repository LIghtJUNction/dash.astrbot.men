name: Sync AstrBot Dashboard

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone AstrBot repository
        run: |
          git clone --depth 1 --branch dev https://github.com/AstrBotDevs/AstrBot.git /tmp/astrbot

      - name: Sync dashboard to root directory
        id: sync
        run: |
          rsync -av --exclude=".git" --exclude=".github" /tmp/astrbot/dashboard/ ./

          if git diff --quiet HEAD -- . ":!.github"; then
            if [ "$(git rev-parse HEAD 2>/dev/null)" != "" ] && [ "$(git ls-tree --name-only HEAD 2>/dev/null)" != "" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "没有检测到文件变化"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "首次同步，直接添加所有文件"
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到文件变化"
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore: sync dashboard from AstrBot@dev ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show sync result
        run: |
          echo "=== Sync Complete ==="
          echo "Has changes: ${{ steps.sync.outputs.has_changes }}"
